<!doctype html>
<html>
	<head>
		<meta charset = "utf-8">
		<title>television</title>
		<style>
			svg {
			  border: 1px solid #dddddd;
			}
		</style>
	</head>
	<body>
	<svg height="250" width="330"> <!--поле-->
	  <rect class="leg" width="15" height="30" x="260" y="220" rx="5" fill="black" /><!--ножки-->
	  <rect class="leg" width="15" height="30" x="50" y="220" rx="5" fill="black" />

	  <rect class="case" width="310" height="200" x="10" y="30" rx="50" fill="dimgray" /><!--корпус-->
	  <rect class="screen" width="200" height="160" x="30" y="50" rx="30" fill="deepskyblue" /><!--экран-->

	  <rect class="panel" width="55" height="100" x="245" y="80" rx="10" fill="black" /><!--панель с кнопками-->
		<!--кнопки-->
	  <rect class="button" width="35" height="15" x="255" y="90" rx="5" fill="red" />
	  <rect class="button" width="35" height="15" x="255" y="120" rx="5" fill="gold" />
	  <rect class="button" width="35" height="15" x="255" y="150" rx="5" fill="lime" />
	</svg>
	</body>
</html>
