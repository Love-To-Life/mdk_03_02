<!doctype html>
<html>
	<head>
		<meta charset = "utf-8">
		<title>pyramide</title>
		<style>
			svg {
			  border: 1px solid #dddddd;
			}
		</style>
	</head>
	<body>
	<svg width="540" height="290">
		<rect class="sand" width="520" height="80" x="10" y="200" fill="yellow" />
		<rect class="sky" width="520" height="200" x="10" y="10" fill="blue" />
		<polygon class="big-pyramid" points="100,240 260,60 440,240" fill="gold" />
		<polygon class="small-pyramid" points="320,250 400,160 480,250" fill="darkgoldenrod" />
	</svg>
	</body>
</html>
